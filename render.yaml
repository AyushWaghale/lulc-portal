services:
  - type: web
    name: lulc-portal-backend
    env: node
    region: singapore  # Change to your preferred region: oregon, frankfurt, ohio, virginia, singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: EMAIL_USER
        sync: false   # Set this manually in Render dashboard
      - key: EMAIL_PASS
        sync: false   # Set this manually in Render dashboard
      - key: ADMIN_EMAIL
        sync: false   # Set this manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false   # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel URL e.g. https://lulc-portal.vercel.app
